<div class="shortcuts-overlay hidden" id="shortcuts-overlay" role="dialog" aria-modal="true">
    <div class="shortcuts-panel">
        <div class="shortcuts-header">
            <h2>Keyboard Shortcuts</h2>
            <button class="shortcuts-close" id="shortcuts-close" aria-label="Close">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
        </div>
        <div class="shortcuts-grid">
            <div class="shortcut-item"><kbd>Ctrl</kbd><kbd>K</kbd><span>Search tools</span></div>
            <div class="shortcut-item"><kbd>Ctrl</kbd><kbd>Shift</kbd><kbd>T</kbd><span>Toggle theme</span></div>
            <div class="shortcut-item"><kbd>?</kbd><span>Show shortcuts</span></div>
            <div class="shortcut-item"><kbd>Esc</kbd><span>Close dialogs</span></div>
            <div class="shortcut-item"><kbd>Alt</kbd><kbd>1–8</kbd><span>Switch tool</span></div>
            <div class="shortcut-item"><kbd>[</kbd><kbd>]</kbd><span>Prev / Next tool</span></div>
        </div>
    </div>
</div>

<!-- Vendor libraries (self-hosted) -->
<script src="vendor/diff_match_patch.js"></script>
<script src="vendor/crypto-js.min.js"></script>
<script src="vendor/monaco/vs/loader.js"></script>

<!-- App scripts -->
<script src="scripts/script.js"></script>
<script src="scripts/jwt-decoder.js"></script>
<script src="scripts/text-differ.js"></script>
<script src="scripts/json-editor.js"></script>
<script src="scripts/url-converter.js"></script>
<script src="scripts/crypto-tools.js"></script>
<script src="scripts/unit-converter.js"></script>
<script src="scripts/password-generator.js"></script>
<script src="scripts/uuid-generator.js"></script>
<script src="scripts/regex-tester.js"></script>
<script src="scripts/cron-parser.js"></script>
<script src="scripts/color-converter.js"></script>
<script src="scripts/base-converter.js"></script>
<script src="scripts/timestamp-converter.js"></script>
<script src="scripts/markdown-preview.js"></script>
<script src="scripts/html-entity.js"></script>
<script src="scripts/dummy-data.js"></script>

<script>
    // Mobile menu
    document.getElementById('mobile-menu-btn')?.addEventListener('click', () => {
        document.getElementById('sidebar').classList.toggle('sidebar-open');
        document.getElementById('sidebar-overlay').classList.toggle('hidden');
    });
    document.getElementById('sidebar-overlay')?.addEventListener('click', () => {
        document.getElementById('sidebar').classList.remove('sidebar-open');
        document.getElementById('sidebar-overlay').classList.add('hidden');
    });
    // Mobile theme toggle mirrors desktop
    document.getElementById('theme-toggle-mobile')?.addEventListener('click', () => {
        document.getElementById('theme-toggle')?.click();
    });
    // Sidebar collapse
    document.getElementById('sidebar-collapse-btn')?.addEventListener('click', () => {
        document.querySelector('.layout-shell').classList.toggle('sidebar-collapsed');
        localStorage.setItem('sniptools-sidebar-collapsed', document.querySelector('.layout-shell').classList.contains('sidebar-collapsed'));
    });
    if (localStorage.getItem('sniptools-sidebar-collapsed') === 'true') {
        document.querySelector('.layout-shell').classList.add('sidebar-collapsed');
    }
    // shortcuts button
    document.getElementById('shortcuts-open-btn')?.addEventListener('click', () => {
        document.getElementById('shortcuts-overlay')?.classList.toggle('hidden');
    });
</script>
</body>
</html>
